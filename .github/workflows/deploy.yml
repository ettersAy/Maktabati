name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true # Cancel in-progress deploys on new push

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test-production:
    name: E2E Test on Production
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10
    continue-on-error: false
    env:
      E2E_BASE_URL: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment propagation
        run: |
          echo "Waiting for GitHub Pages to propagate..."
          for i in {1..30}; do
            if curl -sf "${{ env.E2E_BASE_URL }}" > /dev/null 2>&1; then
              echo "✓ Site is live"
              break
            fi
            echo "⏳ Attempt $i/30..."
            sleep 2
          done

      - name: Run E2E tests on production
        id: e2e-tests
        run: |
          npx playwright test \
            --config tests/e2e/playwright.config.js \
            --project=chromium \
            --max-failures=1
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

      # Optional: Notify on failure (Slack/Discord)
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ E2E tests failed on ${{ env.E2E_BASE_URL }}"
          echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Add Slack/Discord webhook here if needed:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"❌ Deploy failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          #   ${{ secrets.DISCORD_WEBHOOK }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}