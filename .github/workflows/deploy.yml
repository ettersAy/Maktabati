# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }} # <--- CRITICAL: Expose output here
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test-production:
    name: E2E Test on Production
    runs-on: ubuntu-latest
    needs: deploy # Wait for deploy to finish
    timeout-minutes: 10
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment propagation
        run: |
          echo "Waiting for GitHub Pages to propagate..."
          for i in {1..30}; do
            if curl -sf "${{ needs.deploy.outputs.page_url }}" > /dev/null 2>&1; then
              echo "✓ Site is live at ${{ needs.deploy.outputs.page_url }}"
              break
            fi
            echo "⏳ Attempt $i/30... waiting 2s"
            sleep 2
          done

      - name: Run E2E tests on production
        id: e2e-tests
        run: |
          npx playwright test \
            --config tests/e2e/playwright.config.js \
            --project=chromium \
            --max-failures=1
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.page_url }} # <--- FIXED: Use needs instead of steps

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ E2E tests failed on ${{ needs.deploy.outputs.page_url }}"
          echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"